<svg
  width="80"
  height="80"
  viewBox="0 0 120 120"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- Fondo circular -->
  <circle cx="60" cy="60" r="60" fill="#bebebe" />

  <!-- Cuello de tortuga -->
  <rect x="32" y="88" width="56" height="32" rx="8" fill="#1a1a1a" />
  <rect x="42" y="82" width="36" height="16" rx="4" fill="#1a1a1a" />

  <!-- Cuello piel -->
  <rect x="48" y="76" width="24" height="14" rx="4" fill="#c68642" />

  <!-- Cara -->
  <ellipse cx="60" cy="60" rx="24" ry="27" fill="#c68642" />

  <!-- Pelo -->
  <ellipse cx="60" cy="37" rx="24" ry="14" fill="#2a1a0a" />
  <rect x="36" y="37" width="48" height="10" fill="#2a1a0a" />
  <ellipse cx="38" cy="48" rx="6" ry="10" fill="#2a1a0a" />
  <ellipse cx="82" cy="48" rx="6" ry="10" fill="#2a1a0a" />

  <!-- Orejas -->
  <ellipse cx="36" cy="60" rx="4" ry="6" fill="#b87333" />
  <ellipse cx="84" cy="60" rx="4" ry="6" fill="#b87333" />

  <!-- Gafas redondas -->
  <circle
    cx="50"
    cy="58"
    r="9"
    fill="none"
    stroke="#1a1a1a"
    stroke-width="2.5"
  />
  <circle
    cx="70"
    cy="58"
    r="9"
    fill="none"
    stroke="#1a1a1a"
    stroke-width="2.5"
  />
  <circle cx="50" cy="58" r="9" fill="rgba(150,200,255,0.08)" />
  <circle cx="70" cy="58" r="9" fill="rgba(150,200,255,0.08)" />
  <!-- Puente gafas -->
  <line x1="59" y1="58" x2="61" y2="58" stroke="#1a1a1a" stroke-width="2" />
  <!-- Patillas -->
  <line x1="36" y1="56" x2="41" y2="57" stroke="#1a1a1a" stroke-width="2" />
  <line x1="79" y1="57" x2="84" y2="56" stroke="#1a1a1a" stroke-width="2" />

  <!-- Ojos -->
  <circle cx="50" cy="58" r="4" fill="#2a1a0a" />
  <circle cx="70" cy="58" r="4" fill="#2a1a0a" />
  <circle cx="51.5" cy="56.5" r="1" fill="white" opacity="0.6" />
  <circle cx="71.5" cy="56.5" r="1" fill="white" opacity="0.6" />

  <!-- Nariz -->
  <ellipse cx="60" cy="66" rx="3" ry="2" fill="#b87333" />

  <!-- Boca sutil -->
  <path
    d="M53 73 Q60 77 67 73"
    stroke="#8B4513"
    stroke-width="1.5"
    fill="none"
    stroke-linecap="round"
  />
</svg>
